<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>2056: Bir İz Bırak</title>
    <style>
        body { margin: 0; padding: 0; background: #020202; color: #fff; font-family: 'Georgia', serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        header { padding: 80px 20px; text-align: center; max-width: 800px; }
        h1 { font-size: 3rem; font-weight: 300; letter-spacing: 10px; margin-bottom: 20px; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .quote { font-style: italic; color: #888; line-height: 1.6; font-size: 1.2rem; }

        /* Sınırları Belirli Ama Zarif Alan */
        .universe-frame { padding: 10px; border: 1px solid #1a1a1a; background: #050505; margin: 40px 0; box-shadow: 0 0 50px rgba(0,0,0,1); }
        #canvas { 
            width: 1000px; height: 1000px; background: #000; position: relative; cursor: crosshair;
            background-image: radial-gradient(#111 0.5px, transparent 0.5px);
            background-size: 20px 20px; /* Gökyüzü hissi veren hafif doku */
        }
        
        #selection { border: 1px solid #fff; background: rgba(255,255,255,0.05); position: absolute; display: none; box-shadow: 0 0 15px rgba(255,255,255,0.2); }
        
        /* Duygusal Panel */
        .legacy-panel { 
            position: fixed; bottom: 40px; right: 40px; background: rgba(10,10,10,0.95); 
            border: 1px solid #333; padding: 30px; min-width: 250px; text-align: left;
            backdrop-filter: blur(10px);
        }
        .legacy-title { color: #888; text-transform: uppercase; font-size: 11px; letter-spacing: 3px; margin-bottom: 15px; }
        .pixel-info { font-size: 1.5rem; margin-bottom: 20px; font-weight: 300; border-bottom: 1px solid #222; padding-bottom: 15px; }
        
        #claim-btn { 
            background: #fff; color: #000; border: none; padding: 15px 40px; 
            font-size: 1rem; cursor: pointer; letter-spacing: 2px; transition: all 0.4s;
            display: none; width: 100%;
        }
        #claim-btn:hover { background: #888; color: #fff; }

        .founder-mark { width: 1px; height: 1px; background: #fff; position: absolute; box-shadow: 0 0 5px #fff; }
    </style>
</head>
<body>

    <header>
        <h1>2056</h1>
        <p class="quote">"Zaman akıp giderken, arkanda silinmeyecek bir iz kalsın. <br>30 yıl boyunca, tam burada."</p>
    </header>

    <div class="universe-frame">
        <div id="canvas">
            <div id="selection"></div>
            <div class="founder-mark" style="left:0; top:0;"></div>
        </div>
    </div>

    <div class="legacy-panel">
        <div class="legacy-title">Senin Alanın</div>
        <div id="details" class="pixel-info">Karanlıkta yerini seç...</div>
        <button id="claim-btn">İZİNİ BIRAK</button>
    </div>

<script>
    const canvas = document.getElementById('canvas');
    const selection = document.getElementById('selection');
    const details = document.getElementById('details');
    const btn = document.getElementById('claim-btn');

    let startX, startY, isDown = false, data = {};

    canvas.onmousedown = (e) => {
        isDown = true;
        const rect = canvas.getBoundingClientRect();
        startX = e.clientX - rect.left;
        startY = e.clientY - rect.top;
        selection.style.display = 'block';
        btn.style.display = 'none';
    };

    window.onmousemove = (e) => {
        if(!isDown) return;
        const rect = canvas.getBoundingClientRect();
        let x = Math.max(0, Math.min(e.clientX - rect.left, 1000));
        let y = Math.max(0, Math.min(e.clientY - rect.top, 1000));
        
        let w = Math.abs(x - startX);
        let h = Math.abs(y - startY);
        let left = x < startX ? x : startX;
        let top = y < startY ? y : startY;

        selection.style.width = w + 'px';
        selection.style.height = h + 'px';
        selection.style.left = left + 'px';
        selection.style.top = top + 'px';

        let area = Math.round(w * h);
        data = { x: Math.round(left), y: Math.round(top), w: Math.round(w), h: Math.round(h), area, cost: area * 2 };
        
        details.innerHTML = `${data.area} Piksel Miras<br><span style="font-size:18px; color:#888;">${data.cost.toLocaleString()} TL</span>`;
    };

    window.onmouseup = () => {
        isDown = false;
        if(data.area > 20) btn.style.display = 'block';
    };

    btn.onclick = () => {
        const body = `2056 Yılına Notum:\n\nAlan: ${data.w}x${data.h}\nKonum: ${data.x},${data.y}\n\nBu iz 30 yıl boyunca burada kalacak.`;
        window.location.href = `mailto:mail@1milyonpixel.com?subject=Iz_Birak&body=${encodeURIComponent(body)}`;
    };
</script>
</body>
</html>
