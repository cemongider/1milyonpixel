<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>1 Milyon Piksel | 2026-2056</title>
    <style>
        body { margin: 0; padding: 0; background: #fafafa; color: #1a1a1a; font-family: 'Inter', -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; }
        
        /* Üst Bar: Zaman ve Durum */
        .top-status { width: 100%; background: #1a1a1a; color: #fff; padding: 15px 0; text-align: center; font-size: 11px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }
        
        header { padding: 70px 20px; text-align: center; }
        h1 { font-size: 45px; font-weight: 800; margin: 0; letter-spacing: -1px; }
        .slogan { font-size: 16px; color: #666; margin-top: 10px; font-weight: 400; letter-spacing: 1px; }

        /* Arsa Alanı */
        #grid-container { border: 1px solid #000; background: #fff; box-shadow: 0 30px 60px rgba(0,0,0,0.05); position: relative; }
        #canvas { 
            width: 1000px; height: 1000px; position: relative; cursor: crosshair;
            background-image: radial-gradient(#e5e5e5 0.5px, transparent 0.5px);
            background-size: 10px 10px;
        }
        #selection-box { border: 1px solid #000; background: rgba(0,0,0,0.05); position: absolute; display: none; z-index: 10; }
        
        /* Prestij Paneli */
        .info-panel { 
            position: fixed; bottom: 40px; right: 40px; background: #fff; border: 1px solid #000; 
            padding: 35px; min-width: 250px; box-shadow: 15px 15px 0 rgba(0,0,0,0.05);
        }
        .info-panel h3 { margin: 0 0 20px 0; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: #888; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .data-row { margin-bottom: 12px; font-size: 14px; display: flex; justify-content: space-between; }
        .price-display { font-size: 36px; font-weight: 700; color: #000; margin: 25px 0; font-family: 'serif'; }
        
        #btn-reserve { 
            background: #000; color: #fff; border: none; padding: 18px; width: 100%; 
            font-size: 13px; font-weight: bold; cursor: pointer; display: none;
            letter-spacing: 2px; transition: 0.2s;
        }
        #btn-reserve:hover { background: #333; }
        .guarantee { font-size: 10px; color: #aaa; margin-top: 15px; text-align: center; text-transform: uppercase; }

        footer { padding: 80px 0; font-size: 11px; color: #bbb; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="top-status" id="timer">YOLCULUK 2056: -- YIL -- GÜN KALDI</div>

<header>
    <h1>1 MİLYON PİKSEL</h1>
    <p class="slogan">GELECEĞE ATILAN İMZA. 30 YILLIK KALICILIK.</p>
</header>

<div id="grid-container">
    <div id="canvas">
        <div id="selection-box"></div>
        <div style="width:10px; height:10px; background:#000; position:absolute; top:0; left:0;"></div>
    </div>
</div>

<div class="info-panel">
    <h3>DİJİTAL PARSEL</h3>
    <div class="data-row"><span>Konum:</span> <span id="pos">-</span></div>
    <div class="data-row"><span>Ölçü:</span> <span id="dim">-</span></div>
    <div class="data-row"><span>Hacim:</span> <span id="vol">0 PX</span></div>
    <div class="price-display" id="cost">0 TL</div>
    <button id="btn-reserve">ALANI TESCİL ET</button>
    <div class="guarantee">30 Yıl Kesintisiz Yayın Taahhüdü</div>
</div>

<footer>© 2026 - 2056 | İLK GELEN YERİNİ SEÇER</footer>

<script>
    // 2056 Sayacı
    const target = new Date("2056-01-01T00:00:00").getTime();
    setInterval(() => {
        const now = new Date().getTime();
        const diff = target - now;
        const years = Math.floor(diff / (1000 * 60 * 60 * 24 * 365));
        const days = Math.floor((diff % (1000 * 60 * 60 * 24 * 365)) / (1000 * 60 * 60 * 24));
        document.getElementById("timer").innerText = `YOLCULUK 2056: ${years} YIL ${days} GÜN KALDI`;
    }, 1000);

    const canvas = document.getElementById('canvas');
    const sel = document.getElementById('selection-box');
    const btn = document.getElementById('btn-reserve');
    let active = false, sX, sY, rect = {};

    canvas.onmousedown = (e) => {
        active = true;
        const b = canvas.getBoundingClientRect();
        sX = Math.floor((e.clientX - b.left) / 10) * 10;
        sY = Math.floor((e.clientY - b.top) / 10) * 10;
        sel.style.display = 'block';
        btn.style.display = 'none';
    };

    window.onmousemove = (e) => {
        if(!active) return;
        const b = canvas.getBoundingClientRect();
        let cX = Math.max(0, Math.min(Math.floor((e.clientX - b.left) / 10) * 10, 1000));
        let cY = Math.max(0, Math.min(Math.floor((e.clientY - b.top) / 10) * 10, 1000));

        let w = Math.abs(cX - sX);
        let h = Math.abs(cY - sY);
        let l = Math.min(cX, sX);
        let t = Math.min(cY, sY);

        sel.style.width = w + 'px';
        sel.style.height = h + 'px';
        sel.style.left = l + 'px';
        sel.style.top = t + 'px';

        let px = w * h;
        rect = { x: l, y: t, w, h, px, cost: px * 5 };
        
        document.getElementById('pos').innerText = `${l},${t}`;
        document.getElementById('dim').innerText = `${w}x${h}`;
        document.getElementById('vol').innerText = px.toLocaleString() + " PX";
        document.getElementById('cost').innerText = rect.cost.toLocaleString() + " TL";
    };

    window.onmouseup = () => {
        active = false;
        if(rect.px >= 100) btn.style.display = 'block';
    };

    btn.onclick = () => {
        const mailBody = `Parsel Bilgileri:\n\nKonum: ${rect.x},${rect.y}\nBoyut: ${rect.w}x${rect.h}\nPiksel: ${rect.px}\nToplam Tutar: ${rect.cost} TL\n\n30 yıllık tescil işlemini başlatmak istiyorum.`;
        window.location.href = `mailto:mail@1milyonpixel.com?subject=Parsel_Tescili&body=${encodeURIComponent(mailBody)}`;
    };
</script>
</body>
</html>
